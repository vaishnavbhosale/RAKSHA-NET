spring.application.name=RAKSHA-NET

# ── Mail Server Configuration ─────────────────────────────────────────────
# Override with environment variables: MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Alert Notification Configuration ─────────────────────────────────────
# Email address to receive emergency alert notifications
alert.recipient-email=${ALERT_RECIPIENT_EMAIL:admin@example.com}

# ── Twilio SMS Configuration ──────────────────────────────────────────────
# Override with environment variables: TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN,
#   TWILIO_FROM_NUMBER, TWILIO_TO_NUMBER
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}
twilio.to-number=${TWILIO_TO_NUMBER:}